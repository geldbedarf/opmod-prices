name: Update Prices

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: price-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show runner public IP
        run: |
          echo "Runner IP:"
          curl -s https://api.ipify.org
          echo ""

      - name: Test API via curl (debug)
        run: |
          echo "Testing API endpoint..."
          curl -v --max-time 30 https://api.opsucht.net/auctions/active || true

      - name: Fetch & process auctions
        run: python scripts/process_auctions.py

      - name: Commit changes
        run: |
          git config user.name "price-bot"
          git config user.email "bot@users.noreply.github.com"
          git add prices.json history.json seen_uids.json
          git diff --cached --quiet || git commit -m "chore: update prices [skip ci]"
          git push